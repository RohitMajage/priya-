<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#0f172a;
            color:#fff;
            text-align:center;
        }

        .container{
            max-width:600px;
            padding:30px;
        }

        h1{
            font-size:48px;
            margin-bottom:15px;
            color:#38bdf8;
        }

        p{
            font-size:20px;
            line-height:1.6;
            color:#cbd5e1;
        }

        .icon{
            font-size:80px;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🛠️</div>
    <h1>We'll Be Back Soon!</h1>
    <p>
        Our website is currently undergoing scheduled maintenance.<br><br>
        We are working hard to improve your experience.<br>
        Please check back again later.
    </p>
</div>

</body>
</html>
